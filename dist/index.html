<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vv视频 · 频道导航</title>

  <style>
    /* ============================================================
   CSS Custom Properties
   ============================================================ */
:root {
  --av2-bg: #FFFFFF;
  --av2-bg-secondary: #F8F9FA;
  --av2-bg-sidebar: #FAFBFC;
  --av2-bg-hover: rgba(0, 0, 0, .04);
  --av2-bg-active: rgba(108, 99, 255, .08);
  --av2-accent: #6C63FF;
  --av2-accent-hover: #5A52E0;
  --av2-accent-soft: rgba(108, 99, 255, .12);
  --av2-text: #0F1419;
  --av2-text-secondary: rgba(15, 20, 25, .62);
  --av2-text-tertiary: rgba(15, 20, 25, .42);
  --av2-border: rgba(0, 0, 0, .08);
  --av2-radius: 12px;
  --av2-radius-sm: 8px;
  --av2-shadow: 0 2px 8px rgba(0,0,0,.06);
  --av2-shadow-lg: 0 8px 30px rgba(0,0,0,.10);
  --av2-sidebar-width: 200px;
  --av2-topbar-height: 56px;
  --av2-nav-height: 48px;
  --av2-transition: .25s cubic-bezier(.25,.1,.25,1);
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--av2-bg); color: var(--av2-text);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 4px; }

/* ============================================================
   Top Bar
   ============================================================ */
.av2-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--av2-topbar-height);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  background: #fff;
  border-bottom: 1px solid var(--av2-border);
}
.av2-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 18px; font-weight: 800; flex-shrink: 0;
  letter-spacing: -.5px;
}
.av2-logo .av2-logo-icon { width: 28px; height: 28px; flex-shrink: 0; }
.av2-logo .av2-logo-icon svg { width: 100%; height: 100%; display: block; }
.av2-logo .av2-logo-text { font-size: 17px; font-weight: 700; color: var(--av2-text); letter-spacing: .5px; }
.av2-logo .av2-logo-text span { color: var(--av2-accent); }
.av2-topbar-menu-btn {
  display: none; width: 36px; height: 36px; border-radius: 50%;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 20px; transition: background .2s; margin-right: auto;
}
.av2-topbar-menu-btn:hover { background: var(--av2-bg-hover); }

/* ============================================================
   Sidebar
   ============================================================ */
.av2-sidebar {
  position: fixed; top: var(--av2-topbar-height); left: 0; bottom: 0;
  width: var(--av2-sidebar-width); z-index: 50;
  background: var(--av2-bg-sidebar);
  border-right: 1px solid var(--av2-border);
  padding: 12px 0; overflow-y: auto;
  transition: transform .3s ease;
}
.av2-sidebar-label {
  padding: 8px 16px 4px; font-size: 11px; font-weight: 600;
  color: var(--av2-text-tertiary); text-transform: uppercase;
  letter-spacing: .5px;
}
.av2-channel {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; margin: 2px 8px; border-radius: var(--av2-radius-sm);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background .15s;
}
.av2-channel:hover { background: var(--av2-bg-hover); }
.av2-channel.av2-active {
  background: var(--av2-accent-soft);
  color: var(--av2-accent); font-weight: 600;
}
.av2-channel .av2-channel-icon { width: 24px; height: 24px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.av2-channel .av2-channel-icon-fallback {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; background: var(--av2-bg-secondary); flex-shrink: 0;
}

/* ============================================================
   Main Layout
   ============================================================ */
.av2-main {
  margin-top: var(--av2-topbar-height);
  margin-left: var(--av2-sidebar-width);
  min-height: calc(100vh - var(--av2-topbar-height));
  transition: margin-left .3s ease;
}

/* ============================================================
   Content Navigation
   ============================================================ */
.av2-content-nav-wrap {
  position: sticky; top: var(--av2-topbar-height); z-index: 40;
  background: rgba(255, 255, 255, .95);
  border-bottom: 1px solid var(--av2-border);
  visibility: hidden;
  transition: background .35s ease, backdrop-filter .35s ease, box-shadow .35s ease;
}
.av2-content-nav-wrap.av2-nav-loaded { visibility: visible; }
.av2-content-nav-wrap.av2-nav-scrolled {
  background: rgba(255, 255, 255, .72);
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  box-shadow: 0 1px 8px rgba(0,0,0,.06);
}
.av2-content-nav {
  display: flex; align-items: center; gap: 2px;
  height: var(--av2-nav-height);
  padding: 0 24px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.av2-content-nav::-webkit-scrollbar { height: 0; }
.av2-nav-tab {
  flex-shrink: 0; padding: 6px 16px; border-radius: 100px;
  font-size: 13px; font-weight: 500;
  color: var(--av2-text-secondary);
  transition: background var(--av2-transition), color var(--av2-transition);
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.av2-nav-tab:hover { background: var(--av2-bg-hover); color: var(--av2-text); }
.av2-nav-tab.av2-active {
  background: var(--av2-accent-soft);
  color: var(--av2-accent); font-weight: 600;
}

/* ============================================================
   Modal Player (Video.js)
   ============================================================ */
.av2-modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.85);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  animation: av2-modal-fade .2s ease;
}
.av2-modal-overlay.av2-visible { display: flex; }
@keyframes av2-modal-fade { from { opacity: 0; } to { opacity: 1; } }

.av2-modal-player {
  width: min(90vw, 1100px);
  background: #000; border-radius: 10px; overflow: hidden;
  position: relative; box-shadow: 0 12px 48px rgba(0,0,0,.6);
  aspect-ratio: 16 / 9;
  /* 方案 A: clip-path 强制裁切所有子元素 */
  clip-path: inset(0 round 10px);
  -webkit-clip-path: inset(0 round 10px);
}
.av2-modal-player .video-js { width: 100%; height: 100%; }
/* 方案 C: 给内部原生 <video> 标签直接设圆角 */
.av2-modal-player .video-js video {
  border-radius: 10px;
}

/* 封面层 — 覆盖在 video 上方，加载时显示 */
.av2-player-cover {
  position: absolute; inset: 0; z-index: 50;
  display: none;
  background: #000;
}
.av2-player-cover.av2-visible { display: block; }
.av2-player-cover-img {
  width: 100%; height: 100%; object-fit: contain;
  display: block;
}
.av2-player-cover-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.3);
}
.av2-player-cover-loading .av2-spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: av2-cover-spin .8s linear infinite;
}
@keyframes av2-cover-spin { to { transform: rotate(360deg); } }
/* 隐藏中央大播放按钮 */
.av2-modal-player .video-js .vjs-big-play-button {
  display: none !important;
}

/* Top bar overlaid on Video.js */
.av2-player-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(0,0,0,.6), transparent);
  pointer-events: none;
}
.av2-player-top-title {
  font-size: 14px; color: #fff; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-right: 12px;
}
.av2-player-close {
  flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.4); color: #fff; font-size: 17px;
  transition: background .2s; cursor: pointer;
  pointer-events: auto;
}
.av2-player-close:hover { background: rgba(0,0,0,.7); }

/* Video.js skin */
.av2-modal-player .video-js .vjs-control-bar {
  background: linear-gradient(0deg, rgba(0,0,0,.7), transparent);
  display: flex;
}
.av2-modal-player .video-js .vjs-play-control       { order: 1; }
.av2-modal-player .video-js .vjs-current-time       { order: 2; display: flex; }
.av2-modal-player .video-js .vjs-time-divider       { order: 3; display: flex; }
.av2-modal-player .video-js .vjs-duration           { order: 4; display: flex; }
.av2-modal-player .video-js .vjs-progress-control   { order: 5; flex: 1; }
.av2-modal-player .video-js .vjs-volume-panel       { order: 6; }
.av2-modal-player .video-js .vjs-fullscreen-control { order: 7; }
.av2-modal-player .video-js .vjs-current-time-display,
.av2-modal-player .video-js .vjs-duration-display,
.av2-modal-player .video-js .vjs-time-divider {
  font-size: 13px; color: #fff; display: inline;
}
.av2-modal-player .video-js .vjs-custom-control-spacer,
.av2-modal-player .video-js .vjs-playback-rate,
.av2-modal-player .video-js .vjs-live-display,
.av2-modal-player .video-js .vjs-seek-to-live {
  display: none !important;
}

/* ============================================================
   Content & Grid
   ============================================================ */
.av2-content { padding: 20px 24px; }
.av2-section-title { font-size: 18px; font-weight: 700; }

.av2-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
}
.av2-grid.av2-section-mode { display: block; }

.av2-card {
  border-radius: var(--av2-radius); background: var(--av2-bg);
  cursor: pointer; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.av2-card:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.av2-card .av2-thumb {
  position: relative; width: 100%; aspect-ratio: 16 / 9;
  background: #EAECEF; overflow: hidden;
}
.av2-card .av2-thumb .av2-thumb-img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; opacity: 0; transition: opacity .35s ease;
}
.av2-card .av2-thumb .av2-thumb-img.av2-loaded { opacity: 1; }
.av2-card .av2-thumb .av2-duration,
.av2-section-card .av2-thumb .av2-duration {
  position: absolute; bottom: 6px; right: 6px;
  padding: 2px 8px; border-radius: 4px;
  background: rgba(0,0,0,.75); color: #fff;
  font-size: 11px; font-weight: 500; line-height: 1.5;
}
.av2-card .av2-thumb .av2-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.08);
  opacity: 0; transition: opacity .25s;
}
.av2-card:hover .av2-thumb .av2-play-overlay { opacity: 1; }
.av2-card .av2-thumb .av2-play-overlay .av2-play-btn {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.9); color: #000;
  font-size: 18px; padding-left: 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.av2-card .av2-info { padding: 10px 4px; }
.av2-card .av2-info .av2-title {
  font-size: 14px; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 4px;
}

/* ============================================================
   Skeleton
   ============================================================ */
.av2-skeleton { border-radius: var(--av2-radius); background: var(--av2-bg); overflow: hidden; }
.av2-skeleton .av2-sk-thumb {
  width: 100%; aspect-ratio: 16 / 9;
  background: #EAECEF; position: relative; overflow: hidden;
}
.av2-skeleton .av2-sk-thumb::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(15,23,42,.04), transparent);
  animation: av2-shimmer 1.4s infinite linear;
  background-size: 200% 100%;
}
@keyframes av2-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.av2-skeleton .av2-sk-info { padding: 10px 4px 14px; }
.av2-skeleton .av2-sk-line { height: 12px; border-radius: 4px; background: #EAECEF; margin-top: 10px; }
.av2-skeleton .av2-sk-line:last-child { width: 60%; }

/* ============================================================
   Pagination
   ============================================================ */
.av2-pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 32px 0 24px;
}
.av2-page-btn {
  padding: 6px 14px; border-radius: var(--av2-radius-sm);
  font-size: 13px; font-weight: 500;
  background: transparent; color: var(--av2-text-secondary);
  transition: background .15s, color .15s; min-width: 34px; text-align: center;
}
.av2-page-btn:hover { background: var(--av2-bg-hover); color: var(--av2-text); }
.av2-page-btn.av2-active { background: var(--av2-accent); color: #fff; }
.av2-page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ============================================================
   Section Layout
   ============================================================ */
.av2-section { margin-bottom: 28px; }
.av2-section:last-child { margin-bottom: 0; }
.av2-section-header {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 14px; padding: 0 2px;
}
.av2-section-title {
  font-size: 17.6px; font-weight: 600; color: rgb(15, 23, 42);
  letter-spacing: .3px;
}
.av2-section-type {
  font-size: 14.4px; font-weight: 600; color: rgba(15, 23, 42, 0.45);
  letter-spacing: .5px;
  flex-shrink: 0;
}
.av2-section-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px; padding: 4px 0 8px;
}
.av2-section-card {
  border-radius: var(--av2-radius); background: var(--av2-bg);
  cursor: pointer; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.av2-section-card:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.av2-section-card .av2-thumb {
  position: relative; width: 100%; aspect-ratio: 16 / 9;
  background: #EAECEF; overflow: hidden;
}
.av2-section-card .av2-thumb .av2-thumb-img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; opacity: 0; transition: opacity .35s ease;
}
.av2-section-card .av2-thumb .av2-thumb-img.av2-loaded { opacity: 1; }
.av2-section-card .av2-thumb .av2-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.08); opacity: 0; transition: opacity .25s;
}
.av2-section-card:hover .av2-thumb .av2-play-overlay { opacity: 1; }
.av2-section-card .av2-thumb .av2-play-overlay .av2-play-btn {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.9); color: #000;
  font-size: 15px; padding-left: 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.av2-section-card .av2-info { padding: 8px 6px 10px; }
.av2-section-card .av2-info .av2-title {
  font-size: 13px; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.av2-section-card .av2-info .av2-meta { font-size: 11px; color: var(--av2-text-tertiary); margin-top: 2px; }

/* ============================================================
   Empty / Error
   ============================================================ */
.av2-empty { text-align: center; padding: 60px 20px; color: var(--av2-text-tertiary); }
.av2-empty .av2-empty-icon { font-size: 40px; margin-bottom: 12px; }
.av2-empty .av2-empty-text { font-size: 14px; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 900px) {
  .av2-sidebar { transform: translateX(-100%); }
  .av2-sidebar.av2-open { transform: translateX(0); }
  .av2-main { margin-left: 0; }
  .av2-topbar-menu-btn { display: flex; margin-right: 0; }
  .av2-topbar { justify-content: flex-start; }
  .av2-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
}
@media (max-width: 600px) {
  .av2-content { padding: 12px 14px; }
  .av2-content-nav { padding: 0 14px; }
  .av2-grid { grid-template-columns: 1fr; gap: 12px; }
  .av2-section-row { grid-template-columns: 1fr; gap: 12px; }
  .av2-nav-tab { padding: 6px 12px; font-size: 12px; }
}

  </style>
</head>

/* ============================================================
   UTILITIES
   ============================================================ */
function base64ToBytes(b64) {
  let p = b64; const pad = b64.length % 4;
  if (pad) p += '='.repeat(4 - pad);
  const bin = atob(p); const b = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i);
  return b;
}
function shiftString(s, delta) {
  const len = s.length; let r = '';
  const CHUNK = 32768;
  for (let i = 0; i < len; i += CHUNK) {
    const chunk = s.substring(i, Math.min(i + CHUNK, len));
    const cLen = chunk.length;
    const chars = new Uint16Array(cLen);
    for (let j = 0; j < cLen; j++) chars[j] = chunk.charCodeAt(j) + delta;
    r += String.fromCharCode.apply(String, chars);
  }
  return r;
}
const _esc = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
function esc(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => _esc[c]); }

/* ============================================================
   DECRYPT
   ============================================================ */
const masterKeyCache = new Map();
async function getMasterKey(keyStr) {
  if (masterKeyCache.has(keyStr)) return masterKeyCache.get(keyStr);
  const mk = await crypto.subtle.importKey('raw', new TextEncoder().encode(keyStr), { name: 'PBKDF2' }, false, ['deriveKey']);
  masterKeyCache.set(keyStr, mk);
  return mk;
}
async function decryptResponse(resp) {
  if (typeof resp.data !== 'string' || !resp.key) return resp;
  try {
    const shifted = shiftString(resp.data, -3);
    const raw = base64ToBytes(shifted);
    const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ctw = raw.slice(28);
    const tag = ctw.slice(-16), ct = ctw.slice(0, -16);
    const mk = await getMasterKey(resp.key);
    const aesKey = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 1000, hash: 'SHA-256' }, mk, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    const combined = new Uint8Array(ct.length + tag.length);
    combined.set(ct); combined.set(tag, ct.length);
    const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, combined);
    const plain = new TextDecoder().decode(dec);
    try { resp.data = JSON.parse(plain); } catch { resp.data = { plain_text: plain }; }
  } catch (e) { console.warn('[AV2解密] 失败:', e); }
  return resp;
}

/* ============================================================
   IMAGE — 加密图片加载 + LRU 缓存
   ============================================================ */
const imgCache = new Map();
const IMG_CACHE_MAX = 120;
let globalImgKey = null;
let globalObserver = null;

async function getImageKey() {
  if (globalImgKey) return globalImgKey;
  globalImgKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(CONFIG.IMAGE_KEY_ENC), { name: 'AES-CBC' }, false, ['decrypt']);
  return globalImgKey;
}
async function decryptEncImage(encData) {
  const iv = encData.slice(0, 16), ciphertext = encData.slice(16);
  const key = await getImageKey();
  const dec = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, ciphertext);
  const u = new Uint8Array(dec);
  return u.slice(0, u.length - u[u.length - 1]);
}
function touchCache(url) {
  if (imgCache.has(url)) {
    const val = imgCache.get(url);
    imgCache.delete(url);
    imgCache.set(url, val);
  }
}
function cacheImg(url, blobUrl) {
  touchCache(url);
  if (!imgCache.has(url)) imgCache.set(url, blobUrl);
  while (imgCache.size > IMG_CACHE_MAX) {
    const oldest = imgCache.keys().next().value;
    if (oldest === undefined) break;
    const oldBlob = imgCache.get(oldest);
    if (oldBlob) URL.revokeObjectURL(oldBlob);
    imgCache.delete(oldest);
  }
  return blobUrl;
}
async function loadEncryptedImage(url) {
  if (imgCache.has(url)) { touchCache(url); return imgCache.get(url); }
  try {
    const fetchUrl = CONFIG.USE_CORS_PROXY ? CONFIG.CORS_PROXY + encodeURIComponent(url) : url;
    const resp = await fetch(fetchUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const encData = await resp.arrayBuffer();
    const decrypted = await decryptEncImage(new Uint8Array(encData));
    let mime = 'image/jpeg';
    if (url.includes('.png')) mime = 'image/png';
    else if (url.includes('.gif')) mime = 'image/gif';
    else if (url.includes('.webp')) mime = 'image/webp';
    const blob = new Blob([decrypted], { type: mime });
    const blobUrl = URL.createObjectURL(blob);
    return cacheImg(url, blobUrl);
  } catch (e) { console.warn('[AV2图片]', url.slice(-30), e.message); return null; }
}
function initObserver() {
  if (globalObserver) return globalObserver;
  globalObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      const url = img.getAttribute('data-src');
      if (url && !img.dataset.loaded) loadImgFor(img, url);
    });
  }, { rootMargin: '0px 0px 200px 0px', threshold: 0.01 });
  return globalObserver;
}
async function loadImgFor(img, url) {
  if (img.dataset.loaded === 'true') return;
  img.dataset.loaded = 'true';
  try {
    const blobUrl = await loadEncryptedImage(url);
    if (blobUrl && img.parentNode) {
      img.src = blobUrl;
      if ('decode' in img) { img.decode().then(() => img.classList.add('av2-loaded')).catch(() => {}); }
      else { img.classList.add('av2-loaded'); }
    } else { img.dataset.loaded = 'false'; }
  } catch { img.dataset.loaded = 'false'; }
  finally { if (globalObserver && img) globalObserver.unobserve(img); }
}
function observeImages(container) {
  const obs = initObserver();
  container.querySelectorAll('.av2-thumb-img').forEach(img => {
    const url = img.getAttribute('data-src');
    if (!url || img.dataset.observed) return;
    img.dataset.observed = 'true';
    obs.observe(img);
  });
}

/* ============================================================
   API — 网络请求
   ============================================================ */
let currentAbort = null;
function newAbort() { if (currentAbort) currentAbort.abort(); currentAbort = new AbortController(); return currentAbort; }

async function apiRequest(method, url, opts = {}) {
  // 取消上一个请求，创建新的 AbortController
  const abortCtrl = newAbort();
  const { params, data, token } = opts;
  let fullUrl = url;
  if (params) {
    const sp = new URLSearchParams();
    for (const [k, v] of Object.entries(params)) sp.append(k, String(v));
    fullUrl += (fullUrl.includes('?') ? '&' : '?') + sp.toString();
  }
  if (CONFIG.USE_CORS_PROXY) fullUrl = CONFIG.CORS_PROXY + encodeURIComponent(fullUrl);
  const headers = { ...CONFIG.HEADERS };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const fetchOpts = { method, headers, signal: abortCtrl.signal };
  if (method === 'POST' && data) {
    fetchOpts.body = JSON.stringify(data);
    if (!CONFIG.USE_CORS_PROXY) headers['Content-Type'] = 'application/json; charset=utf-8';
  }
  const resp = await fetch(fullUrl, fetchOpts);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  let result = await resp.json();
  result = await decryptResponse(result);
  return result;
}

async function getToken() {
  const cached = (() => {
    try {
      const raw = localStorage.getItem(CONFIG.TOKEN_CACHE_KEY);
      if (!raw) return null;
      const d = JSON.parse(raw);
      return (d.accessToken && d.accessTokenTtl && d.createdAt) ? d : null;
    } catch { return null; }
  })();
  if (cached && Date.now() < cached.createdAt + cached.accessTokenTtl * 1000) return cached.accessToken;
  try {
    if (cached?.refreshToken) await apiRequest('POST', CONFIG.AUTH.REFRESH, { data: { token: cached.refreshToken } }).catch(() => {});
    const fp = await generateFingerprint();
    const resp = await apiRequest('POST', CONFIG.AUTH.LOGIN, { data: { fingerPrint: fp } });
    if (resp.code === 200 && resp.data?.accessToken) {
      const d = resp.data;
      const info = { accessToken: d.accessToken, refreshToken: d.refreshToken, accessTokenTtl: d.accessTokenTtl, createdAt: Date.now() };
      localStorage.setItem(CONFIG.TOKEN_CACHE_KEY, JSON.stringify(info));
      return d.accessToken;
    }
  } catch (e) { console.warn('[AV2 Token]', e.message); }
  return cached?.accessToken || null;
}
async function generateFingerprint() {
  let seed = localStorage.getItem(CONFIG.FP_SEED_KEY);
  if (!seed) {
    const ts = Date.now();
    const rnd = Array.from({ length: 12 }, () => Math.floor(Math.random() * 16).toString(16)).join('');
    seed = ts + '-' + rnd;
    localStorage.setItem(CONFIG.FP_SEED_KEY, seed);
  }
  const ua = navigator.userAgent, lang = navigator.language, plat = navigator.platform;
  const hw = navigator.hardwareConcurrency || 8, mtp = navigator.maxTouchPoints || 5;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const sw = screen?.width || 1080, sh = screen?.height || 2400, cd = screen?.colorDepth || 24, dpr = window.devicePixelRatio || 3.0;
  const feat = `v1|${seed}|${ua}|${lang}|${plat}|${hw}|${mtp}|${tz}|${sw}x${sh}|${cd}|${dpr}`;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(feat));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ============================================================
   PAGE CACHE
   ============================================================ */
const pageCache = new Map();
const PAGE_CACHE_MAX = 20;
const pageCacheOrder = [];
function cachePage(key, val) {
  if (pageCache.has(key)) { const i = pageCacheOrder.indexOf(key); if (i > -1) pageCacheOrder.splice(i, 1); }
  pageCache.set(key, val); pageCacheOrder.push(key);
  if (pageCacheOrder.length > PAGE_CACHE_MAX) { const oldest = pageCacheOrder.shift(); pageCache.delete(oldest); }
}
function cacheGet(key) { return pageCache.has(key) ? pageCache.get(key) : null; }

/* ============================================================
   PLAYER — Video.js 播放器封装
   ============================================================ */
let vjsPlayer = null;
let vjsInitialized = false;

const player = {
  _initVjs() {
    if (vjsInitialized) return;
    const videoEl = document.getElementById('av2Video');
    vjsPlayer = videojs(videoEl, {
      controls: true,
      autoplay: true,
      preload: 'auto',
      inactivityTimeout: 5000,
      controlBar: {
        volumePanel: { inline: false },
        pictureInPictureToggle: false,
        remainingTimeDisplay: false,
      },
    });
    vjsInitialized = true;
  },

  /** 显示封面 + 加载转圈 */
  _showCover(thumbUrl, title) {
    dom.playerTitle.textContent = title;
    dom.playerCover.classList.add('av2-visible');
    // 异步加载解密后的封面图（不阻塞播放流程）
    if (thumbUrl) {
      loadEncryptedImage(thumbUrl).then(blobUrl => {
        if (blobUrl) dom.playerCoverImg.src = blobUrl;
      }).catch(() => {});
    }
  },

  /** 隐藏封面 */
  _hideCover() {
    dom.playerCover.classList.remove('av2-visible');
    dom.playerCoverImg.src = '';
  },

  async play(videoId, title, thumbUrl) {
    dom.modalOverlay.classList.add('av2-visible');
    this._showCover(thumbUrl, title || '加载中…');

    try {
      const data = await CHANNEL_VV.fetchVideoDetail(state.token, videoId);
      if (!data) throw new Error('获取播放地址失败');
      const playUrl = data.play_hls_url || (data.href ? CONFIG.HOST + data.href : '');
      if (!playUrl) throw new Error('暂无播放地址');
      dom.playerTitle.textContent = data.title || title;

      this._initVjs();
      vjsPlayer.src({ src: playUrl, type: 'application/x-mpegURL' });

      // ★ 事件监听器先于 play() 注册，避免竞态
      // 视频开始播放 → 隐藏封面
      vjsPlayer.one('playing', () => {
        this._hideCover();
      });
      // 播放出错 → 显示错误
      vjsPlayer.one('error', () => {
        dom.playerCoverLoading?.classList.remove('av2-visible');
        dom.playerTitle.textContent = '播放出错，请重试';
      });

      // 尝试播放
      const p = vjsPlayer.play();
      if (p) {
        p.catch(() => {
          // 自动播放被阻止（例如 iOS）→ 隐藏封面+转圈，用户可手动点播放
          this._hideCover();
        });
      }
    } catch (e) {
      // AbortError = 用户快速切换视频，不显示错误
      if (e.name === 'AbortError') return;
      dom.playerTitle.textContent = '播放失败: ' + e.message;
    }
  },

  close() {
    if (vjsPlayer) {
      vjsPlayer.pause();
      vjsPlayer.reset();
    }
    this._hideCover();
    dom.modalOverlay.classList.remove('av2-visible');
  },
};

  dom.modalOverlay?.addEventListener('click', (e) => {

  });

  document.addEventListener('keydown', (e) => {
    if (!dom.modalOverlay?.classList.contains('av2-visible')) return;
    if (e.key === 'Escape') { player.close(); }
  });
}

    }
  });

  // 导航 Tab 点击
  dom.contentNav.addEventListener('click', (e) => {
    const tab = e.target.closest('.av2-nav-tab');
    if (!tab) return;
    const id = parseInt(tab.dataset.id, 10);
    if (id && id !== state.activeTabId) {
      state.activeTabId = id;
      state.page = 1;
      ui.updateNavActive(id);
      window.scrollTo(0, 0);
      dom.main.scrollTop = 0;
      loadTabContent(id);
    }
  });

  // 视频卡片点击
  dom.grid.addEventListener('click', (e) => {
    const card = e.target.closest('.av2-card, .av2-section-card');
    if (!card) return;
    const id = card.dataset.id;
    const title = card.dataset.title;
    const thumbUrl = card.dataset.thumb || '';
    if (id) player.play(id, title, thumbUrl);
  });

  // 分页
  dom.pagination.addEventListener('click', (e) => {
    const btn = e.target.closest('.av2-page-btn');
    if (!btn || btn.disabled) return;
    const p = parseInt(btn.dataset.page, 10);
    if (p > 0 && p !== state.page) {
      state.page = p;
      window.scrollTo(0, 0);
      dom.main.scrollTop = 0;
      loadTabContent(state.activeTabId);
    }
  });

  // 移动端菜单
  dom.menuBtn.addEventListener('click', () => {
    dom.sidebar.classList.toggle('av2-open');
    dom.drawerOverlay.style.display = dom.sidebar.classList.contains('av2-open') ? 'block' : 'none';
  });
  dom.drawerOverlay.addEventListener('click', () => {
    dom.sidebar.classList.remove('av2-open');
    dom.drawerOverlay.style.display = 'none';
  });
}

/* ---- Tab 内容加载 ---- */
async function loadTabContent(tabId) {
  const navItem = state.navList.find(n => n.id === tabId);
  const cacheKey = tabId === 1 ? '_home' : tabId === 99 ? '_latest' : `tab_${tabId}_p${state.page}`;

  player.close();

  const cached = cacheGet(cacheKey);
  if (cached) {
    if (tabId === 1 || tabId === 99) {
      dom.grid.classList.add('av2-section-mode');
      dom.pagination.innerHTML = '';
    } else {
      dom.grid.classList.remove('av2-section-mode');
      ui.renderPagination(state.page, state.total, 24);
    }
    dom.grid.innerHTML = cached;
    dom.grid.querySelectorAll('.av2-thumb-img').forEach(img => {
      img.removeAttribute('data-observed');
      img.removeAttribute('data-loaded');
      img.removeAttribute('src');
      img.classList.remove('av2-loaded');
    });
    observeImages(dom.grid);
    return;
  }

  if (tabId === 1 || tabId === 99) {
    dom.grid.classList.add('av2-section-mode');
  } else {
    dom.grid.classList.remove('av2-section-mode');
  }
  ui.showSkeleton(8);
  dom.pagination.innerHTML = '';

  try {
    if (tabId === 1) {
      const pool = {};
      const promises = [
        CHANNEL_VV.fetchVideoList(state.token, { page: '1', limit: '5', type: 'good', videoType: '1', typeId: '0' }).then(r => pool.pick = r.list).catch(() => {}),
        CHANNEL_VV.fetchVideoList(state.token, { page: '1', limit: '10', type: 'hot', videoType: '1', typeId: '0' }).then(r => pool.hot = r.list).catch(() => {}),
        CHANNEL_VV.fetchVideoList(state.token, { page: '1', limit: '10', type: 'last', typeId: '0' }).then(r => pool.last = r.list).catch(() => {}),
        CHANNEL_VV.fetchHomeIndex(state.token).then(list => pool.groups = list).catch(() => {}),
      ];
      await Promise.allSettled(promises);

      const sections = [];
      if (pool.pick?.length) sections.push({ title: '每日精选', type: 'DAY', list: pool.pick });
      if (pool.hot?.length) sections.push({ title: '热门推荐', type: 'HOT', list: pool.hot });
      if (pool.last?.length) sections.push({ title: '最近更新', type: 'NEW', list: pool.last });
      if (pool.groups?.length) {
        const typeMap = { '探花': 'LABEL', '黑料': 'LABEL', '日本': 'CATE', 'ai换脸': 'LABEL' };
        pool.groups.forEach(g => {
          if (g.list?.length) sections.push({ title: g.title || g.name || '', type: typeMap[g.title || g.name] || 'CATE', list: g.list });
        });
      }
      ui.renderSections(sections);
      dom.pagination.innerHTML = '';
      cachePage(cacheKey, dom.grid.innerHTML);
      return;
    }

    if (tabId === 99) {
      const sections = await CHANNEL_VV.fetchLatestVideos(state.token);
      if (sections && sections.length > 0) {
        ui.renderSections(sections);
      } else {
        const { list } = await CHANNEL_VV.fetchVideoList(state.token, { page: '1', limit: '24', type: 'last', typeId: '0' });
        ui.renderGrid(list);
      }
      dom.pagination.innerHTML = '';
      cachePage(cacheKey, dom.grid.innerHTML);
      return;
    }

    const params = { page: String(state.page), limit: '24' };
    if (navItem?.tid !== undefined) { params.type = navItem.type; params.typeId = navItem.tid; }
    const { list, total } = await CHANNEL_VV.fetchVideoList(state.token, params);
    state.videos = list;
    state.total = total;
    ui.renderGrid(list);
    ui.renderPagination(state.page, total, 24);
    cachePage(cacheKey, dom.grid.innerHTML);
  } catch (e) {
    dom.grid.innerHTML = `<div class="av2-empty"><div class="av2-empty-icon">⚠️</div><div class="av2-empty-text">加载失败: ${esc(e.message)}</div></div>`;
  }
}

function loadCurrentChannel() {
  loadTabContent(state.activeTabId);
}

/* ---- 启动 ---- */
async function bootstrap() {
  try {
    state.token = await getToken();
    let navList = await CHANNEL_VV.fetchNavList(state.token);
    if (!navList || navList.length === 0) throw new Error('导航列表为空');

    const homeIdx = navList.findIndex(n => n.type === 'home');
    if (homeIdx !== -1) navList.splice(homeIdx + 1, 0, { id: 99, title: '最新视频', type: 'latest', tid: 0 });
    else navList.push({ id: 99, title: '最新视频', type: 'latest', tid: 0 });

    state.navList = navList;

    const channels = [
      { name: CONFIG.CHANNEL_NAME, icon: CONFIG.CHANNEL_ICON },
    ];
    ui.renderChannels(channels);
    ui.renderNavTabs(navList, 1);
    await loadTabContent(1);
  } catch (e) {
    dom.grid.innerHTML = `<div class="av2-empty"><div class="av2-empty-icon">❌</div><div class="av2-empty-text">启动失败: ${esc(e.message)}<br><button onclick="location.reload()" style="margin-top:12px;padding:8px 24px;border-radius:8px;background:#6C63FF;color:#fff;border:none;cursor:pointer;font-size:14px">重新加载</button></div></div>`;
  }
}

/* ---- 初始化 ---- */
function init() {
  cacheDom();
  bindPlayerUIClose();
  bindEvents();
  bootstrap();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

</script>
